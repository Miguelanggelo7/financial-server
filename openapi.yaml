openapi: 3.0.3
info:
  title: Financial Back API
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Local

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        full_name:
          type: string

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        is_default:
          type: boolean
        key:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Errors:
      type: object
      properties:
        errors:
          type: array
          items:
            type: string

    Error:
      type: object
      properties:
        error:
          type: string

    Transaction:
      type: object
      properties:
        id:
          type: integer
        amount_cents:
          type: integer
          description: "Amount in cents (negative = expense, positive = income). e.g. -1250 means -$12.50"
        amount:
          type: string
          description: "Human-readable decimal string. e.g. \"-12.50\""
        currency:
          type: string
          enum: [USD, EUR, USDT]
        description:
          type: string
          nullable: true
        transacted_at:
          type: string
          format: date-time
        category:
          $ref: "#/components/schemas/Category"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

paths:
  /api/v1/auth/sign_up:
    post:
      summary: Sign Up
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user]
              properties:
                user:
                  type: object
                  required: [email, password, password_confirmation, first_name, last_name]
                  properties:
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                    password_confirmation:
                      type: string
                    first_name:
                      type: string
                    last_name:
                      type: string
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "422":
          description: Validation errors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Errors"

  /api/v1/auth/sign_in:
    post:
      summary: Sign In
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user]
              properties:
                user:
                  type: object
                  required: [email, password]
                  properties:
                    email:
                      type: string
                      format: email
                    password:
                      type: string
      responses:
        "200":
          description: Authenticated — JWT returned in Authorization header
          headers:
            Authorization:
              schema:
                type: string
              description: "Bearer <token>"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/auth/sign_out:
    delete:
      summary: Sign Out
      tags: [Auth]
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "401":
          description: No active session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/categories:
    get:
      summary: List Categories
      tags: [Categories]
      responses:
        "200":
          description: List of categories for the authenticated user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      summary: Create Category
      tags: [Categories]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [category]
              properties:
                category:
                  type: object
                  required: [name]
                  properties:
                    name:
                      type: string
                    description:
                      type: string
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "422":
          description: Validation errors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Errors"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/categories/{id}:
    delete:
      summary: Delete Category
      tags: [Categories]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Category deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "422":
          description: Category has transactions and cannot be deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Errors"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/transactions:
    get:
      summary: List Transactions
      tags: [Transactions]
      responses:
        "200":
          description: List of transactions for the authenticated user, ordered newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      summary: Create Transaction
      tags: [Transactions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [transaction]
              properties:
                transaction:
                  type: object
                  required: [amount_cents, transacted_at, category_id]
                  properties:
                    amount_cents:
                      type: integer
                      description: "Amount in cents, non-zero. Negative for expenses, positive for income."
                    currency:
                      type: string
                      enum: [USD, EUR, USDT]
                      default: USD
                    description:
                      type: string
                    transacted_at:
                      type: string
                      format: date-time
                    category_id:
                      type: integer
      responses:
        "201":
          description: Transaction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "422":
          description: Validation errors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Errors"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/transactions/parse_from_prompt:
    post:
      summary: Parse and Create Transaction from Natural Language Prompt
      description: >
        Sends the amount and a natural language description to an LLM (Groq).
        The LLM infers the transaction description, the most appropriate category,
        and the date. Returns the created transaction.
      tags: [Transactions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount_cents, prompt]
              properties:
                amount_cents:
                  type: integer
                  description: "Amount in cents, non-zero. Negative for expenses, positive for income."
                currency:
                  type: string
                  enum: [USD, EUR, USDT]
                  default: USD
                prompt:
                  type: string
                  description: "Natural language description of the transaction. e.g. 'Dinner with friends at Italian restaurant last night'"
      responses:
        "201":
          description: Transaction created from prompt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "400":
          description: Missing required parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: LLM error or transaction validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/transactions/{id}:
    get:
      summary: Get Transaction
      tags: [Transactions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transaction found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    patch:
      summary: Update Transaction
      tags: [Transactions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [transaction]
              properties:
                transaction:
                  type: object
                  properties:
                    amount_cents:
                      type: integer
                    currency:
                      type: string
                      enum: [USD, EUR, USDT]
                    description:
                      type: string
                    transacted_at:
                      type: string
                      format: date-time
                    category_id:
                      type: integer
      responses:
        "200":
          description: Transaction updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "422":
          description: Validation errors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Errors"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      summary: Delete Transaction
      tags: [Transactions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transaction deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
